name: Build KavitaBabyAI APK

on:
  push:
    paths:
      - 'KavitaBabyAI.zip'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Locate and extract KavitaBabyAI.zip
        run: |
          ZIP_PATH=$(find . -iname "KavitaBabyAI.zip" | head -n 1)
          if [ -z "$ZIP_PATH" ]; then
            echo "ERROR: KavitaBabyAI.zip not found in repo"
            exit 1
          fi
          echo "Found zip at: $ZIP_PATH"
          mkdir -p extracted
          unzip -o "$ZIP_PATH" -d extracted

          PROJECT_DIR=$(find extracted -maxdepth 3 -iname "settings.gradle" -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: settings.gradle not found inside zip"
            exit 1
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Inject API keys into local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$PROJECT_DIR/local.properties"
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> "$PROJECT_DIR/local.properties"
          echo "GROK_API_KEY=${{ secrets.GROK_API_KEY }}" >> "$PROJECT_DIR/local.properties"

      - name: Grant execute permission for gradlew
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: Build debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: KavitaBabyAI-debug
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: KavitaBabyAI-release
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
