name: Kavita Baby Updated

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # local.properties is never committed to git (see local.properties.template).
      # It's created fresh here on every build from the repo's Actions secrets,
      # so the real Grok/Gemini keys never touch the git history.
      - name: Write local.properties from secrets
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "GROK_API_KEY=${{ secrets.GROK_API_KEY }}" >> local.properties
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
          echo "HF_ACCESS_TOKEN=${{ secrets.HF_ACCESS_TOKEN }}" >> local.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kavita-baby-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
