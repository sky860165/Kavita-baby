name: Unzip source

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip the source
        run: |
          unzip -o KavitaBabyAI-source.zip -d .
          rm KavitaBabyAI-source.zip

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Extract source zip" || echo "Nothing to commit"
          git push
