name: Build KavitaBabyAI APK

on:
  push:
    paths:
      - 'KavitaBabyAI.zip'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip source
        run: |
          ZIP_PATH=$(find . -maxdepth 1 -iname "KavitaBabyAI.zip" | head -n 1)
          if [ -z "$ZIP_PATH" ]; then
            echo "ERROR: KavitaBabyAI.zip not found in repo root"
            exit 1
          fi
          echo "Found zip at: $ZIP_PATH"
          rm -rf extracted
          mkdir -p extracted
          unzip -o "$ZIP_PATH" -d extracted

          PROJECT_DIR=$(find extracted -maxdepth 3 -iname "settings.gradle" -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: settings.gradle not found anywhere inside the zip"
            find extracted -maxdepth 3
            exit 1
          fi
          echo "Project root detected at: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew

      - name: Inject Grok API Key
        working-directory: ${{ env.PROJECT_DIR }}
        run: echo "GROK_API_KEY=${{ secrets.GROK_API_KEY }}" >> local.properties

      - name: Inject Gemini API Keys
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
          echo "GEMINI_API_KEY_2=${{ secrets.GEMINI_API_KEY_2 }}" >> local.properties
          echo "GEMINI_API_KEY_3=${{ secrets.GEMINI_API_KEY_3 }}" >> local.properties
          echo "GEMINI_API_KEY_4=${{ secrets.GEMINI_API_KEY_4 }}" >> local.properties

      - name: Add SDK path
        working-directory: ${{ env.PROJECT_DIR }}
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Verify local.properties keys are non-empty
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          for KEY in GROK_API_KEY GEMINI_API_KEY GEMINI_API_KEY_2 GEMINI_API_KEY_3 GEMINI_API_KEY_4; do
            if grep -q "^${KEY}=$" local.properties; then
              echo "::warning::${KEY} is EMPTY after injection"
            fi
          done
          echo "local.properties keys present (values hidden):"
          sed 's/=.*/=<hidden>/' local.properties

      - name: Build debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: KavitaBabyAI-debug
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: KavitaBabyAI-release
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
