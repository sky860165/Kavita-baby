name: Unzip source

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unzip the source
        run: |
          unzip -o KavitaBabyAI-source.zip -d .
          rm -f KavitaBabyAI-source.zip
          ls -la
          echo "--- kavita-baby-project contents ---"
          ls -la kavita-baby-project || echo "FOLDER NOT FOUND"

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git status
          git commit -m "Extract source zip" || echo "Nothing to commit"
          git push origin HEAD:main
